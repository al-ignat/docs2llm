name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y pandoc
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: npm --prefix raycast ci
      - run: npm --prefix raycast test

  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: ./docs2llm --version
      - run: ./docs2llm --help

  build-raycast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm --prefix raycast ci
      - run: bun run build:raycast
