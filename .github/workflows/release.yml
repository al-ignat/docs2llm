name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.6.4/pandoc-3.6.4-1-amd64.deb
          sudo dpkg -i pandoc-3.6.4-1-amd64.deb
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: npm --prefix raycast ci
      - run: npm --prefix raycast test

  build-binaries:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            artifact: docs2llm-darwin-arm64
          - os: macos-13
            arch: x64
            artifact: docs2llm-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run build

      # Verify the binary works
      - run: ./docs2llm --version
      - run: ./docs2llm --help

      # Package binary + libpdfium into tarball
      - name: Package
        run: |
          mkdir -p dist
          cp docs2llm dist/
          cp libpdfium.dylib dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Generate checksums
      - name: Checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} ../ \;
          cd ..
          sha256sum docs2llm-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs2llm-darwin-arm64.tar.gz
            docs2llm-darwin-x64.tar.gz
            checksums.txt

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
